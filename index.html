<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login & Register</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6b4262, #90056b);
            padding: 20px;
        }
        
        .container {
            width: 380px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .2);
            overflow: hidden;
        }
        
        .top {
            display: flex;
        }
        
        .top button {
            width: 50%;
            padding: 18px;
            border: none;
            background: #812976;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: .3s;
        }
        
        .top button.active {
            background: #f204ce;
            color: white;
        }
        
        .form {
            padding: 30px;
            display: none;
            animation: fade .4s;
        }
        
        .form.active {
            display: block;
        }
        
        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h2 {
            margin-bottom: 20px;
            color: #1e293b;
        }
        
        .input {
            margin-bottom: 15px;
            position: relative;
        }
        
        .input input {
            width: 100%;
            padding: 13px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        
        .input input:focus {
            border-color: #2563eb;
        }
        
        .show {
            position: absolute;
            right: 15px;
            top: 13px;
            cursor: pointer;
            color: #2563eb;
            font-size: 13px;
        }
        
        .submit {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }
        
        .submit:hover {
            background: #4ee900;
        }
        
        .message {
            margin-top: 15px;
            text-align: center;
            color: #2563eb;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="top">
            <button class="active" onclick="showLogin()">Login</button>
            <button onclick="showRegister()">Create Account</button>
        </div>

        <!-- LOGIN -->

        <div id="login" class="form active">

            <h2>NAME BIRTHDATE </h2>

            <div class="input">
                <input type="email" id="loginEmail" placeholder="Example:CB2006">
            </div>

            <div class="input">
                <input type="password" id="loginPassword" placeholder="Password">
                <span class="show" onclick="toggle('loginPassword')">Show</span>
            </div>

            <button class="submit" onclick="login()">Login</button>

            <div class="message" id="loginMsg"></div>

        </div>

        <!-- REGISTER -->

        <div id="register" class="form">

            <h2>Create Account</h2>

            <div class="input">
                <input type="text" id="name" placeholder="Full Name">
            </div>
            <h2>NAME DATEBIRTH </h2>
            <div class="input">
                <input type="email" id="email" placeholder="Example:CB2006">
            </div>
            <h2>PASSWORD</h2>
            <div class="input">
                <input type="password" id="password" placeholder="Passwor">
                <span class="show" onclick="toggle('password')">Show</span>
            </div>

            <button class="submit" onclick="register()">Register</button>

            <div class="message" id="registerMsg"></div>

        </div>

    </div>

    <script>
        // Replace with your Apps Script URL
        const API = "https://script.google.com/macros/s/AKfycbyy3cpLcVTkXuAc4f1ErSa6jF6_Ydk1rrqaQ372XrEtWwgoZfeINTgWS02tMnjUyMgM/exec";

        function showLogin() {

            document.getElementById("login").classList.add("active");
            document.getElementById("register").classList.remove("active");

            document.querySelectorAll(".top button")[0].classList.add("active");
            document.querySelectorAll(".top button")[1].classList.remove("active");

        }

        function showRegister() {

            document.getElementById("register").classList.add("active");
            document.getElementById("login").classList.remove("active");

            document.querySelectorAll(".top button")[1].classList.add("active");
            document.querySelectorAll(".top button")[0].classList.remove("active");

        }

        function toggle(id) {

            const input = document.getElementById(id);

            input.type = input.type === "password" ? "text" : "password";

        }



        async function register() {

            const data = {

                action: "register",

                name: document.getElementById("name").value,

                email: document.getElementById("email").value,

                password: document.getElementById("password").value

            };

            try {

                const res = await fetch(API, {
                    method: "POST",
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                document.getElementById("registerMsg").innerHTML = result.message;

            } catch {

                document.getElementById("registerMsg").innerHTML = "Server Error";

            }

        }

        async function login() {

            const data = {

                action: "login",

                email: document.getElementById("loginEmail").value,

                password: document.getElementById("loginPassword").value

            };

            try {

                const res = await fetch(API, {
                    method: "POST",
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                document.getElementById("loginMsg").innerHTML = result.message;

                if (result.status == "success") {

                    window.location = "FIRST.html";

                }



            } catch {

                document.getElementById("loginMsg").innerHTML = "Server Error";

            }

        }
    </script>

</body>

</html>
